<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TabTalk | Aero Hybrid & Video</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root {
--aero-green: linear-gradient(180deg, #a4e637 0%, #45ad01 50%, #68c312 100%);
--aero-blue: linear-gradient(180deg, #74b9ff 0%, #0984e3 100%);
--border-style: 2px outset #ffffff;
--win-bg: #ece9d8;
}
body, html {
margin: 0; padding: 0; width: 100%; height: 100%;
font-family: 'Tahoma', sans-serif; overflow: hidden;
background: linear-gradient(135deg, #00b4db 0%, #0083b0 50%, #45ad01 100%);
}
#app { width: 100vw; height: 100vh; display: flex; flex-direction: column; backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.2); }
header {
background: var(--aero-blue); height: 50px; padding: 0 20px;
display: flex; justify-content: space-between; align-items: center;
border-bottom: 2px solid #003366; box-shadow: inset 0 10px 10px rgba(255,255,255,0.4);
color: white; text-shadow: 1px 1px 2px #000;
}
button { border-radius: 25px !important; border: var(--border-style); padding: 8px 18px; cursor: pointer; font-weight: bold; }
nav { background: var(--aero-green); padding: 8px; display: flex; gap: 10px; border-bottom: 1px solid #2d6e01; overflow-x: auto; }
nav button { background: rgba(255,255,255,0.4); color: #003300; border: 1px solid #fff; white-space: nowrap; }
.screen { display: none; flex-grow: 1; padding: 20px; overflow-y: auto; }
.active-screen { display: flex; flex-direction: column; }
.profile-window { display: flex; width: 100%; height: 100%; background: var(--win-bg); border-radius: 25px; overflow: hidden; border: var(--border-style); }
.profile-side { width: 220px; background: var(--aero-blue); padding: 25px; color: white; text-align: center; border-right: 2px solid #003366; }
.avatar-circle { width: 110px; height: 110px; border-radius: 50%; background-color: #fff; margin: 0 auto 15px; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; }
.forum-card { background: rgba(255,255,255,0.9); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; }

/* Окна модалок и звонков */
#modal-overlay, #call-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
.modal-window { background: var(--win-bg); border-radius: 30px; padding: 30px; min-width: 350px; border: 4px outset #fff; }

/* Стили для видео */
.video-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
video { width: 240px; height: 180px; background: #222; border-radius: 15px; border: 2px solid #fff; object-fit: cover; }

@media (max-width: 768px) {
.profile-window { flex-direction: column; }
.profile-side { width: 100%; border-right: none; border-bottom: 2px solid #003366; }
#screen-chats > div { flex-direction: column; }
.modal-window { min-width: 90%; }
.video-container { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<div id="modal-overlay">
<div class="modal-window">
<div id="modal-title" style="font-weight:bold; margin-bottom:15px; color: #003366;"></div>
<div id="modal-body"></div>
<div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 25px;">
<button onclick="closeModal()" style="background:#b2bec3;">Закрыть</button>
<button id="modal-ok" style="background: var(--aero-green); color: white;">Ок</button>
</div>
</div>
</div>

<div id="call-overlay">
<div class="modal-window" style="text-align: center; min-width: 550px;">
<h2 id="call-status" style="color: #003366; margin-bottom: 20px;">Вызов...</h2>
<div class="video-container">
<div>
<span style="font-size: 12px; font-weight: bold;">Вы</span><br>
<video id="local-video" autoplay muted playsinline></video>
</div>
<div>
<span style="font-size: 12px; font-weight: bold;">Собеседник</span><br>
<video id="remote-video" autoplay playsinline></video>
</div>
</div>
<div style="display: flex; gap: 15px; justify-content: center;">
<button id="answer-btn" style="background: var(--aero-green); color: white; display: none;">Ответить</button>
<button onclick="endCall()" style="background: #ff4757; color: white;">Положить трубку</button>
</div>
</div>
</div>

<div id="app">
<header>
<div style="font-size: 22px;">TabTalk <b>Aero Video</b></div>
<div>Ваш P2P ID: <span id="my-id-display" style="font-weight:bold; color:yellow;">Не в сети</span></div>
</header>

<nav id="navbar" style="display: none;">
<button onclick="showScreen('chats')">P2P Чаты</button>
<button onclick="showScreen('forum')">Общий Форум</button>
<button onclick="showScreen('groups')">Группы</button>
<button onclick="showScreen('profile')">Мой профиль</button>
</nav>

<div id="screen-auth" class="screen active-screen">
<div style="margin: auto; text-align: center; background: rgba(255,255,255,0.1); padding: 50px; border-radius: 40px;">
<h1 style="color: white; font-size: 40px;">TabTalk</h1>
<input type="text" id="username-input" placeholder="Введите ваш ник" style="width: 250px; padding: 10px; border-radius: 10px;"><br><br>
<button onclick="initApp()" style="background:var(--aero-green); color:white; width: 200px;">Войти в сеть</button>
</div>
</div>

<div id="screen-chats" class="screen">
<div style="display: flex; gap: 15px; height: 100%;">
<div style="width: 250px; background: rgba(255,255,255,0.7); border-radius: 25px; padding: 20px; display: flex; flex-direction: column;">
<button onclick="promptAddFriend()" style="background:white; margin-bottom: 15px;">+ Добавить друга по ID</button>
<div id="friends-list" style="overflow-y:auto; flex-grow: 1;"></div>
</div>
<div style="flex-grow: 1; background: rgba(255,255,255,0.9); border-radius: 25px; display: flex; flex-direction: column;">
<div id="chat-header" style="padding: 15px; border-bottom: 1px solid #ddd; font-weight: bold; color: #0984e3; display: flex; justify-content: space-between; align-items: center;">
<span id="active-chat-title">Выберите друга из списка</span>
<div id="call-buttons" style="display: none; gap: 10px;">
<button onclick="startCall(false)" style="background: white;">📞 Аудио</button>
<button onclick="startCall(true)" style="background: white;">📹 Видео</button>
</div>
</div>
<div id="msg-box" style="flex-grow: 1; overflow-y: auto; padding: 20px;"></div>
<div style="padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.03);">
<input type="text" id="msg-input" placeholder="Напишите сообщение..." style="flex-grow: 1; border-radius:18px; padding:8px;" onkeydown="if(event.key==='Enter') sendP2PMsg()">
<button onclick="sendP2PMsg()" style="background: var(--aero-green); color: white;">✉</button>
</div>
</div>
</div>
</div>

<div id="screen-forum" class="screen">
<button onclick="newForumPost()" style="background:white; margin-bottom:20px;">+ Написать в форум</button>
<div id="forum-content"></div>
</div>

<div id="screen-groups" class="screen">
<button onclick="createGroupDialog()" style="background:white; margin-bottom:20px;">+ Создать группу</button>
<div id="my-groups-list"></div>
</div>

<div id="screen-profile" class="screen">
<div class="profile-window">
<div class="profile-side">
<div class="avatar-circle" id="prof-ava">?</div>
<h3 id="prof-nick">Загрузка...</h3>
</div>
<div style="padding:40px; background:white; flex-grow:1;">
<h2>О себе</h2>
<p id="prof-bio">Пользователь мессенджера TabTalk.</p>
</div>
</div>
</div>
</div>

<script>
// === 1. ТВОИ КЛЮЧИ FIREBASE (ВСТАВЬ СВОИ ДАННЫЕ В КАВЫЧКИ) ===
const firebaseConfig = {
apiKey: "AIzaSyB_YVlmaz9t3CRGW_QDEOyMIEUjCKrYv8I",
authDomain: "tabtalk-71f85.firebaseapp.com",
databaseURL:  "https://tabtalk-71f85-default-rtdb.firebaseio.com",
projectId: "tabtalk-71f85",
storageBucket: "tabtalk-71f85.firebasestorage.app",
messagingSenderId: "929744795946",
appId: "1:929744795946:web:5300bea38a050942724653"
};
firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

let myId = "";
let peer = null;
let connections = {};
let chatHistory = {};
let activeChatUser = null;
let cloudData = { forum: [], groups: [] };

// Переменные для звонков
let localStream = null;
let currentCall = null;

// Слушаем базу данных (Форум и Группы)
rdb.ref('/').on('value', (snap) => {
cloudData = snap.val() || { forum: [], groups: [] };
renderForum();
renderGroups();
});

// === 2. ИНИЦИАЛИЗАЦИЯ И СЕТЬ ===
function initApp() {
const username = document.getElementById('username-input').value.trim();
if(!username) return alert("Введите ник!");

myId = username;
document.getElementById('prof-nick').innerText = myId;
document.getElementById('prof-ava').innerText = myId[0].toUpperCase();

// Запуск P2P
peer = new Peer(myId);

peer.on('open', (id) => {
document.getElementById('my-id-display').innerText = id;
document.getElementById('screen-auth').classList.remove('active-screen');
document.getElementById('navbar').style.display = 'flex';
showScreen('chats');
});

peer.on('connection', (conn) => { setupConnection(conn); });

// СЛУШАЕМ ВХОДЯЩИЙ ЗВОНОК
peer.on('call', (call) => {
document.getElementById('call-overlay').style.display = 'flex';
document.getElementById('call-status').innerText = `Вам звонит: ${call.peer}`;
const answerBtn = document.getElementById('answer-btn');
answerBtn.style.display = 'inline-block';

answerBtn.onclick = async () => {
try {
// Просим камеру и микрофон для ответа
localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
document.getElementById('local-video').srcObject = localStream;

call.answer(localStream); // Отвечаем на звонок и шлем свой поток
setupCallStream(call);
} catch (err) {
alert("Не удалось включить камеру: " + err);
endCall();
}
};
currentCall = call;
});
}

function promptAddFriend() {
showModal("Новый чат", `Введите ID друга:<br><input id="peer-id-input" style="width:100%">`, () => {
const remoteId = document.getElementById('peer-id-input').value.trim();
if(!remoteId || remoteId === myId) return;
const conn = peer.connect(remoteId);
setupConnection(conn);
});
}

function setupConnection(conn) {
connections[conn.peer] = conn;
conn.on('open', () => { renderFriendsList(); startChatWith(conn.peer); });
conn.on('data', (data) => {
if(!chatHistory[conn.peer]) chatHistory[conn.peer] = [];
chatHistory[conn.peer].push({ f: conn.peer, txt: data.txt });
if(activeChatUser === conn.peer) renderMessages();
else alert(`Новое сообщение от ${conn.peer}!`);
});
}

function sendP2PMsg() {
const input = document.getElementById('msg-input');
const text = input.value.trim();
if(!text || !activeChatUser) return;
const conn = connections[activeChatUser];
if(conn) {
conn.send({ txt: text });
if(!chatHistory[activeChatUser]) chatHistory[activeChatUser] = [];
chatHistory[activeChatUser].push({ f: myId, txt: text });
input.value = '';
renderMessages();
}
}

// === 3. ФУНКЦИИ ЗВОНКОВ (WebRTC) ===
async function startCall(withVideo) {
if (!activeChatUser) return;

document.getElementById('call-overlay').style.display = 'flex';
document.getElementById('call-status').innerText = `Звоним ${activeChatUser}...`;
document.getElementById('answer-btn').style.display = 'none';

try {
// Захватываем вебку и микрофон
localStream = await navigator.mediaDevices.getUserMedia({ video: withVideo, audio: true });
document.getElementById('local-video').srcObject = localStream;

// Звоним другу по P2P
const call = peer.call(activeChatUser, localStream);
setupCallStream(call);
currentCall = call;
} catch (err) {
alert("Ошибка доступа к камере/микрофону: " + err);
endCall();
}
}

function setupCallStream(call) {
// Когда получаем видеопоток от собеседника:
call.on('stream', (remoteStream) => {
document.getElementById('call-status').innerText = `На связи с ${call.peer}`;
document.getElementById('remote-video').srcObject = remoteStream;
});

call.on('close', () => { endCall(); });
}

function endCall() {
if (currentCall) currentCall.close();
if (localStream) {
localStream.getTracks().forEach(track => track.stop()); // Выключаем камеру физически
}
document.getElementById('call-overlay').style.display = 'none';
document.getElementById('local-video').srcObject = null;
document.getElementById('remote-video').srcObject = null;
currentCall = null;
localStream = null;
}

// === 4. ФУНКЦИИ ФОРУМА И ГРУПП (FIREBASE) ===
function newForumPost() {
showModal("Новый пост", `<textarea id="nt" style="width:100%"></textarea>`, () => {
const v = document.getElementById('nt').value;
if(v) {
const posts = cloudData.forum || [];
posts.push({auth: myId, txt: v});
rdb.ref('forum').set(posts);
}
});
}

function renderForum() {
const box = document.getElementById('forum-content');
if(!box) return;
const posts = cloudData.forum || [];
box.innerHTML = posts.map(p => `<div class="forum-card"><b>${p.auth}</b>: ${p.txt}</div>`).join('');
}

function createGroupDialog() {
showModal("Создать группу", `Название:<br><input id="g-n" style="width:100%">`, () => {
const n = document.getElementById('g-n').value;
if(n) {
const groups = cloudData.groups || [];
groups.push({name: n, owner: myId});
rdb.ref('groups').set(groups);
}
});
}

function renderGroups() {
const box = document.getElementById('my-groups-list');
if(!box) return;
const groups = cloudData.groups || [];
box.innerHTML = groups.map(g => `<div class="forum-card">👥 <b>${g.name}</b> (Создатель: ${g.owner})</div>`).join('');
}

// === 5. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
function startChatWith(peerId) {
activeChatUser = peerId;
document.getElementById('active-chat-title').innerText = `Чат с: ${peerId}`;
document.getElementById('call-buttons').style.display = 'flex'; // Показываем кнопки звонков
renderMessages();
}

function renderMessages() {
const box = document.getElementById('msg-box'); box.innerHTML = '';
const history = chatHistory[activeChatUser] || [];
history.forEach(m => {
const isMe = m.f === myId;
box.innerHTML += `<div style="text-align:${isMe?'right':'left'}"><div class="forum-card" style="display:inline-block; margin-bottom:10px; ${isMe?'background:#e1ffc7':''}"><b>${m.f}</b>:<br>${m.txt}</div></div>`;
});
box.scrollTop = box.scrollHeight;
}

function renderFriendsList() {
const list = document.getElementById('friends-list'); list.innerHTML = '<b>Активные чаты:</b><br><br>';
Object.keys(connections).forEach(peerId => { list.innerHTML += `<div onclick="startChatWith('${peerId}')" style="background:white; padding:10px; border-radius:15px; margin-bottom:10px; cursor:pointer;"><b>${peerId}</b></div>`; });
}

function showScreen(n) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById('screen-'+n).classList.add('active-screen'); }
function showModal(t, b, ok) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-body').innerHTML = b; document.getElementById('modal-overlay').style.display = 'flex'; document.getElementById('modal-ok').onclick = () => { if(ok) ok(); closeModal(); }; }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>
</body>
</html>
